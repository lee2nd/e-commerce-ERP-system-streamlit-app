name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'       # app 透過 GitHub API 寫入資料時不觸發同步

  # 允許手動觸發此工作流程
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      # 移除 data/ 資料夾（HF Space 透過 GitHub API 讀寫，不需要本地資料）
      - name: Remove data folder before push
        run: |
          git rm -rf --cached data/ || true
          rm -rf data/
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "Exclude data folder for HF deployment"
          
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://lee2nd:$HF_TOKEN@huggingface.co/spaces/lee2nd/my-erp main