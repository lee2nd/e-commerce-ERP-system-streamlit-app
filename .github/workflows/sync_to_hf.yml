name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # 允許手動觸發此工作流程
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1    # 淺 clone，不帶歷史
          lfs: false        # 不需要 LFS

      # 建立乾淨的 orphan branch（資料已移至 Cloudflare R2，不在 repo 內）
      - name: Create clean branch
        run: |
          rm -rf .git
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b main
          git add .
          git commit -m "Deploy to HF (without data folder)"
          
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://lee2nd:$HF_TOKEN@huggingface.co/spaces/lee2nd/my-erp main